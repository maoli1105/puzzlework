services:
  # ── バックエンド ──────────────────────────────────────────
  - type: web
    name: puzzlework-api
    env: node
    region: singapore
    plan: starter
    buildCommand: cd backend && npm install && npm run build && npm run migrate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: puzzlework-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://puzzlework.onrender.com
      - key: RESEND_API_KEY
        value: ""
      - key: EMAIL_FROM
        value: ""

  # ── フロントエンド ────────────────────────────────────────
  - type: web
    name: puzzlework
    env: static
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://puzzlework-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── データベース ──────────────────────────────────────────────
databases:
  - name: puzzlework-db
    region: singapore
    plan: starter
